name: CI Build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Control Plane
        run: dotnet build RelayChat.ControlPlane.Api/RelayChat.ControlPlane.Api.csproj -c Release --nologo

      - name: Build Node
        run: dotnet build RelayChat.Node.Api/RelayChat.Node.Api.csproj -c Release --nologo

      - name: Build Client
        run: dotnet build RelayChat.Client/RelayChat.Client.csproj -c Release --nologo
