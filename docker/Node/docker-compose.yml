services:
  relaychat-node:
    container_name: relaychat-node-staging
    image: ghcr.io/royalscribblz/relaychat-node:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__NodeDatabase: Host=node-postgres;Port=5432;Database=${NODE_DB_NAME};Username=${NODE_DB_USER};Password=${NODE_DB_PASSWORD}
      Cors__AllowedOrigins__0: ${CLIENT_ORIGIN}
      RelayTokens__Issuer: ${RELAY_TOKEN_ISSUER}
      RelayTokens__NodeAudience: ${RELAY_NODE_AUDIENCE}
      RelayTokens__SigningKey: ${RELAY_SIGNING_KEY}
      LiveKit__ServerUrl: http://node-livekit:7880
      LiveKit__WebSocketUrl: ${LIVEKIT_PUBLIC_WS_URL}
      LiveKit__ApiKey: ${LIVEKIT_API_KEY}
      LiveKit__ApiSecret: ${LIVEKIT_API_SECRET}
    depends_on:
      node-postgres:
        condition: service_healthy
      node-livekit:
        condition: service_started
    ports:
      - "27062:8080"
    restart: unless-stopped

  node-postgres:
    container_name: relaychat-node-postgres-staging
    image: postgres:17
    environment:
      POSTGRES_DB: ${NODE_DB_NAME}
      POSTGRES_USER: ${NODE_DB_USER}
      POSTGRES_PASSWORD: ${NODE_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NODE_DB_USER} -d ${NODE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - node-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  node-livekit:
    container_name: relaychat-livekit-staging
    image: livekit/livekit-server:latest
    command:
      - --config
      - /etc/livekit/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - "27063:7880"
      - "27064:7881"
      - "27065:7882/udp"
    restart: unless-stopped

volumes:
  node-postgres-data:
